<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的基金仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f0f2f5;
            --bg-card: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --border: #e5e7eb;
            --accent: #3b82f6;
            --accent-light: #eff6ff;
            --up: #dc2626;
            --up-bg: #fef2f2;
            --down: #16a34a;
            --down-bg: #f0fdf4;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
            --shadow-lg: 0 4px 6px rgba(0,0,0,.05), 0 10px 15px rgba(0,0,0,.08);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: 200ms cubic-bezier(.4,0,.2,1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Layout ===== */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 100px;
            background: var(--down-bg);
            color: var(--down);
        }

        .header-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .header-meta time {
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition);
        }

        .refresh-btn:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .refresh-btn svg {
            width: 14px;
            height: 14px;
        }

        .refresh-btn.spinning svg {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Summary Cards ===== */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .summary-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all var(--transition);
            cursor: default;
        }

        .summary-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        .summary-card__label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-card__value {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-family: var(--font-mono);
        }

        .summary-card__sub {
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .summary-card__sub.up { color: var(--up); }
        .summary-card__sub.down { color: var(--down); }

        /* ===== Main Grid ===== */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* ===== Chart Card ===== */
        .chart-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .chart-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px 0;
        }

        .chart-card__title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .chart-periods {
            display: flex;
            gap: 4px;
            background: var(--bg);
            border-radius: 8px;
            padding: 3px;
        }

        .chart-period {
            padding: 5px 14px;
            font-size: 0.78rem;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            background: transparent;
            transition: all var(--transition);
        }

        .chart-period.active {
            background: var(--bg-card);
            color: var(--accent);
            box-shadow: var(--shadow-sm);
        }

        .chart-period:hover:not(.active) {
            color: var(--text);
        }

        #nav-chart {
            width: 100%;
            height: 360px;
        }

        /* ===== Fund Table ===== */
        .table-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            grid-column: 1 / -1;
            overflow: hidden;
        }

        .table-card__header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .fund-table {
            width: 100%;
            border-collapse: collapse;
        }

        .fund-table th {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 24px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            background: #fafbfc;
        }

        .fund-table td {
            padding: 14px 24px;
            font-size: 0.88rem;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }

        .fund-table tbody tr:hover td {
            background: #f8fafc;
        }

        .fund-table tbody tr:last-child td {
            border-bottom: none;
        }

        .fund-code {
            font-family: var(--font-mono);
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        .fund-name {
            font-weight: 500;
            color: var(--text);
        }

        .fund-type-tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.3px;
        }

        .fund-type-tag.otc {
            background: #eff6ff;
            color: #3b82f6;
        }

        .fund-type-tag.etf {
            background: #fef3c7;
            color: #d97706;
        }

        .nav-value {
            font-family: var(--font-mono);
            font-weight: 600;
        }

        .change-cell {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.85rem;
        }

        .change-cell.up { color: var(--up); }
        .change-cell.down { color: var(--down); }

        .mini-spark {
            display: inline-block;
            width: 60px;
            height: 24px;
            vertical-align: middle;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pie-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            padding: 18px 20px;
        }

        .pie-card__title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }

        #position-pie {
            width: 100%;
            height: 300px;
        }

        /* ===== AI Analysis ===== */
        .ai-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .ai-card__header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, #f8fafc, #eff6ff);
        }

        .ai-card__icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .ai-card__title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .ai-card__time {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .ai-card__body {
            padding: 20px 24px;
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text);
        }

        .ai-card__body .signal-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 600;
            margin: 0 2px;
        }

        .ai-card__body .signal-buy {
            background: var(--up-bg);
            color: var(--up);
        }

        .ai-card__body .signal-hold {
            background: #fffbeb;
            color: #d97706;
        }

        .ai-card__body .signal-sell {
            background: var(--down-bg);
            color: var(--down);
        }

        .ai-card__body ul {
            list-style: none;
            padding: 0;
        }

        .ai-card__body li {
            padding: 8px 0;
            border-bottom: 1px dashed var(--border);
        }

        .ai-card__body li:last-child {
            border-bottom: none;
        }

        .ai-card__body li::before {
            content: '▸';
            color: var(--accent);
            margin-right: 8px;
            font-size: 0.7rem;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* ===== Loading & Empty ===== */
        .loading-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            .sidebar {
                grid-template-columns: 1fr;
            }
            #nav-chart {
                height: 280px;
            }
            #position-pie {
                height: 260px;
            }
            .fund-table th,
            .fund-table td {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .summary-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 16px 12px 24px;
            }
        }

        /* ===== Print ===== */
        @media print {
            body { background: white; }
            .container { max-width: 100%; padding: 0; }
            .refresh-btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-title">
                <h1>我的基金仪表盘</h1>
                <span class="header-badge">
                    <span class="dot"></span> 数据自动更新
                </span>
            </div>
            <div class="header-meta">
                <time id="update-time">加载中...</time>
                <button class="refresh-btn" id="refresh-btn" title="刷新数据">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6M23 20v-6h-6"/>
                        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
                    </svg>
                    刷新
                </button>
            </div>
        </header>

        <!-- Summary Cards -->
        <div class="summary-grid" id="summary-grid">
            <div class="summary-card">
                <div class="summary-card__label">持仓总额</div>
                <div class="summary-card__value" id="total-value">--</div>
                <div class="summary-card__sub" id="total-value-sub"></div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label">今日收益</div>
                <div class="summary-card__value" id="daily-change">--</div>
                <div class="summary-card__sub" id="daily-change-sub"></div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label">持仓基金</div>
                <div class="summary-card__value" id="fund-count">--</div>
                <div class="summary-card__sub" id="fund-count-sub"></div>
            </div>
            <div class="summary-card">
                <div class="summary-card__label">总收益率</div>
                <div class="summary-card__value" id="total-return">--</div>
                <div class="summary-card__sub" id="total-return-sub"></div>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="main-grid">
            <!-- Left: Chart + Table -->
            <div>
                <!-- NAV Chart -->
                <div class="chart-card">
                    <div class="chart-card__header">
                        <span class="chart-card__title">净值走势对比</span>
                        <div class="chart-periods">
                            <button class="chart-period active" data-period="1m">近1月</button>
                            <button class="chart-period" data-period="3m">近3月</button>
                            <button class="chart-period" data-period="6m">近6月</button>
                            <button class="chart-period" data-period="1y">近1年</button>
                        </div>
                    </div>
                    <div id="nav-chart"></div>
                </div>

                <!-- Fund Table -->
                <div class="table-card" style="margin-top:20px;">
                    <div class="table-card__header">基金持仓明细</div>
                    <div style="overflow-x:auto;">
                        <table class="fund-table">
                            <thead>
                                <tr>
                                    <th>代码</th>
                                    <th>名称</th>
                                    <th>类型</th>
                                    <th>单位净值</th>
                                    <th>日涨跌</th>
                                    <th>近1周</th>
                                    <th>近1月</th>
                                </tr>
                            </thead>
                            <tbody id="fund-table-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right: Sidebar -->
            <div class="sidebar">
                <!-- Position Pie -->
                <div class="pie-card">
                    <div class="pie-card__title">持仓分布</div>
                    <div id="position-pie"></div>
                </div>

                <!-- AI Analysis Summary (compact for sidebar) -->
                <div class="ai-card" style="margin-bottom:0;">
                    <div class="ai-card__header">
                        <div class="ai-card__icon">🤖</div>
                        <span class="ai-card__title">AI 操作建议</span>
                        <span class="ai-card__time" id="ai-time"></span>
                    </div>
                    <div class="ai-card__body" id="ai-summary" style="font-size:0.85rem;">
                        <div class="loading-overlay">加载分析中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            数据由 GitHub Actions 自动更新 · AI 分析由 DeepSeek 驱动 · 
            <a href="https://github.com" target="_blank">GitHub</a>
        </footer>
    </div>

    <script>
    (function() {
        // ===== State =====
        let fundData = null;
        let aiReport = null;
        let navChart = null;
        let pieChart = null;
        let currentPeriod = '1m';

        // ===== DOM =====
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        // ===== Formatting =====
        const fmtMoney = (v) => '¥' + Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        const fmtPercent = (v) => (v >= 0 ? '+' : '') + Number(v).toFixed(2) + '%';
        const fmtNav = (v) => Number(v).toFixed(4);
        const fmtDate = (s) => {
            if (!s) return '';
            const d = new Date(s);
            return d.toLocaleString('zh-CN', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
        };

        // ===== Fetch Data =====
        async function loadData() {
            try {
                const [dataRes, aiRes] = await Promise.allSettled([
                    fetch('./data.json?' + Date.now()),
                    fetch('./ai_report.json?' + Date.now())
                ]);

                if (dataRes.status === 'fulfilled' && dataRes.value.ok) {
                    fundData = await dataRes.value.json();
                } else {
                    console.warn('Failed to load fund data, using fallback');
                }

                if (aiRes.status === 'fulfilled' && aiRes.value.ok) {
                    aiReport = await aiRes.value.json();
                }

                render();
            } catch (e) {
                console.error('Data load error:', e);
                // Try without cache bust
                try {
                    const r = await fetch('./data.json');
                    fundData = await r.json();
                } catch (_) {}
                try {
                    const r = await fetch('./ai_report.json');
                    aiReport = await r.json();
                } catch (_) {}
                render();
            }
        }

        // ===== Render =====
        function render() {
            if (!fundData) {
                document.getElementById('update-time').textContent = '数据加载失败';
                return;
            }
            renderHeader();
            renderSummary();
            renderChart();
            renderTable();
            renderPie();
            renderAI();
        }

        function renderHeader() {
            document.getElementById('update-time').textContent = '更新于 ' + fmtDate(fundData.update_time);
        }

        function renderSummary() {
            const s = fundData.summary || {};
            document.getElementById('total-value').textContent = s.total_value ? fmtMoney(s.total_value) : '--';
            document.getElementById('daily-change').textContent = s.daily_change != null ? fmtMoney(s.daily_change) : '--';
            document.getElementById('fund-count').textContent = (fundData.funds || []).length + ' 只';
            document.getElementById('total-return').textContent = s.total_return_percent != null ? fmtPercent(s.total_return_percent) : '--';

            const upCls = (v) => v >= 0 ? 'up' : 'down';
            const upHtml = (v) => `<span class="${upCls(v)}">${fmtPercent(v)}</span>`;

            if (s.daily_change_percent != null) {
                document.getElementById('daily-change-sub').innerHTML = '日涨幅 ' + upHtml(s.daily_change_percent);
            }
            document.getElementById('total-value-sub').textContent = s.daily_change ? '较昨日变动' : '';
            document.getElementById('fund-count-sub').textContent = '场外' + fundData.funds.filter(f=>f.type==='otc').length + ' · 场内' + fundData.funds.filter(f=>f.type==='etf').length;
            document.getElementById('total-return-sub').textContent = s.total_return != null ? '累计收益 ' + fmtMoney(s.total_return) : '';
        }

        function renderTable() {
            const tbody = document.getElementById('fund-table-body');
            const funds = fundData.funds || [];
            const upCls = (v) => v >= 0 ? 'up' : 'down';

            tbody.innerHTML = funds.map(f => `
                <tr>
                    <td class="fund-code">${f.code}</td>
                    <td class="fund-name">${f.name}</td>
                    <td><span class="fund-type-tag ${f.type}">${f.type === 'etf' ? 'ETF' : '场外'}</span></td>
                    <td class="nav-value">${fmtNav(f.net_value)}</td>
                    <td class="change-cell ${upCls(f.daily_change_percent)}">${fmtPercent(f.daily_change_percent)}</td>
                    <td class="change-cell ${upCls(f.week_change || 0)}">${fmtPercent(f.week_change || 0)}</td>
                    <td class="change-cell ${upCls(f.month_change || 0)}">${fmtPercent(f.month_change || 0)}</td>
                </tr>
            `).join('');
        }

        function renderChart() {
            const el = document.getElementById('nav-chart');
            if (!el) return;

            if (!navChart) {
                navChart = echarts.init(el);
                window.addEventListener('resize', () => navChart.resize());
            }

            const funds = fundData.funds || [];
            const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            const hasHistory = funds.some(f => f.nav_history && f.nav_history.length > 0);

            if (!hasHistory) {
                navChart.setOption({
                    title: { text: '暂无历史净值数据', left: 'center', top: 'center', textStyle: { color: '#9ca3af', fontSize: 14 } }
                });
                return;
            }

            const series = funds.map((f, i) => ({
                name: f.name,
                type: 'line',
                data: (f.nav_history || []).map(d => [d.date, d.value]),
                smooth: true,
                symbol: 'none',
                lineStyle: { width: 2, color: colors[i % colors.length] },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: colors[i % colors.length] + '20' },
                        { offset: 1, color: colors[i % colors.length] + '02' }
                    ])
                }
            }));

            navChart.setOption({
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: '#fff',
                    borderColor: '#e5e7eb',
                    textStyle: { color: '#1a1a2e', fontSize: 12 },
                    boxShadow: '0 4px 12px rgba(0,0,0,0.1)'
                },
                legend: {
                    bottom: 0,
                    textStyle: { fontSize: 12, color: '#6b7280' },
                    itemWidth: 12,
                    itemHeight: 8,
                    itemGap: 16
                },
                grid: { left: 16, right: 16, top: 12, bottom: 40 },
                xAxis: {
                    type: 'time',
                    axisLine: { lineStyle: { color: '#e5e7eb' } },
                    axisTick: { show: false },
                    axisLabel: { color: '#9ca3af', fontSize: 11 },
                    splitLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    scale: true,
                    axisLine: { show: false },
                    axisTick: { show: false },
                    axisLabel: { color: '#9ca3af', fontSize: 11 },
                    splitLine: { lineStyle: { color: '#f3f4f6' } }
                },
                series: series
            }, true);
        }

        function renderPie() {
            const el = document.getElementById('position-pie');
            if (!el) return;

            if (!pieChart) {
                pieChart = echarts.init(el);
                window.addEventListener('resize', () => pieChart.resize());
            }

            const funds = fundData.funds || [];
            const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];

            // Use position weight from data, or equal distribution as fallback
            const hasWeight = funds.some(f => f.position_weight);
            const data = funds.map((f, i) => ({
                name: f.name,
                value: hasWeight ? (f.position_weight || 0) : 1,
                itemStyle: { color: colors[i % colors.length] }
            }));

            pieChart.setOption({
                tooltip: {
                    trigger: 'item',
                    backgroundColor: '#fff',
                    borderColor: '#e5e7eb',
                    textStyle: { color: '#1a1a2e', fontSize: 12 },
                    formatter: function(p) {
                        return p.name + '<br/>占比: ' + p.percent + '%';
                    }
                },
                series: [{
                    type: 'pie',
                    radius: ['55%', '80%'],
                    center: ['50%', '50%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 6,
                        borderColor: '#fff',
                        borderWidth: 3
                    },
                    label: {
                        show: true,
                        position: 'outside',
                        formatter: '{b}',
                        fontSize: 11,
                        color: '#6b7280'
                    },
                    labelLine: {
                        length: 20,
                        length2: 30,
                        lineStyle: { color: '#d1d5db' }
                    },
                    emphasis: {
                        label: { fontSize: 14, fontWeight: 'bold' },
                        scaleSize: 8
                    },
                    data: data
                }]
            }, true);
        }

        function renderAI() {
            const summaryEl = document.getElementById('ai-summary');
            const timeEl = document.getElementById('ai-time');

            if (!aiReport || !aiReport.signals) {
                summaryEl.innerHTML = '<p style="color:#9ca3af;">AI 分析报告尚未生成，等待首次自动分析...</p>';
                timeEl.textContent = '';
                return;
            }

            timeEl.textContent = fmtDate(aiReport.generated_at);

            const signalMap = { buy: 'signal-buy', hold: 'signal-hold', sell: 'signal-sell' };
            const signalText = { buy: '买入/加仓', hold: '持有观望', sell: '卖出/减仓' };

            let html = '<p style="margin-bottom:12px;font-weight:500;">' + (aiReport.overview || '') + '</p>';
            html += '<ul>';

            (aiReport.signals || []).forEach(s => {
                html += '<li>';
                html += '<strong>' + s.fund_name + '</strong>：';
                html += '<span class="signal-tag ' + (signalMap[s.signal] || '') + '">' + (signalText[s.signal] || s.signal) + '</span> ';
                html += (s.reason || '');
                html += '</li>';
            });

            if (aiReport.risk_note) {
                html += '<li style="margin-top:8px;color:#6b7280;">⚠️ ' + aiReport.risk_note + '</li>';
            }

            html += '</ul>';
            summaryEl.innerHTML = html;
        }

        // ===== Period Switching =====
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('chart-period')) {
                $$('.chart-period').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentPeriod = e.target.dataset.period;
                renderChart();
            }
        });

        // ===== Refresh =====
        document.getElementById('refresh-btn').addEventListener('click', async function() {
            const btn = this;
            btn.classList.add('spinning');
            btn.disabled = true;
            await loadData();
            setTimeout(() => {
                btn.classList.remove('spinning');
                btn.disabled = false;
            }, 500);
        });

        // ===== Init =====
        loadData();
    })();
    </script>
</body>
</html>
